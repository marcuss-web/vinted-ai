<!DOCTYPE html>

<head>
    <meta charset="UTF-8">

    <title>Vinted AI · Resale Intelligence</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        :root {
            --bg: #07090f;
            --surface: #0e1119;
            --surface2: #141820;
            --border: #1c2333;
            --accent: #00e5ff;
            --purple: #7c3aed;
            --text: #e2e8f4;
            --muted: #4b5a72;
            --green: #10b981;
            --red: #ef4444;
            --amber: #f59e0b;
        }
        
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow-x: hidden;
        }
        
        @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap');
        
        @keyframes up { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes shimmer { 0% { background-position: -200% center; } 100% { background-position: 200% center; } }
        
        .animate-up { animation: up 0.4s ease both; }
        .badge { padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 600; letter-spacing: .04em; text-transform: uppercase; display: inline-block; }
        .badge-green { background: rgba(16,185,129,.12); border: 1px solid rgba(16,185,129,.35); color: #10b981; }
        .badge-amber { background: rgba(245,158,11,.12); border: 1px solid rgba(245,158,11,.35); color: #f59e0b; }
        .badge-red { background: rgba(239,68,68,.12); border: 1px solid rgba(239,68,68,.35); color: #ef4444; }
        .badge-cyan { background: rgba(0,229,255,.12); border: 1px solid rgba(0,229,255,.35); color: #00e5ff; }
        
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 20px; transition: transform .2s, box-shadow .2s; }
        .card:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(0,229,255,.07); }
        
        .btn-nav { display: flex; align-items: center; gap: 16px; padding: 20px 18px; background: var(--surface); border: 1px solid var(--border); border-radius: 18px; cursor: pointer; text-align: left; transition: all .2s; font-family: inherit; width: 100%; color: var(--text); }
        .btn-nav:hover { border-color: rgba(0,229,255,.4); background: #0f1622; transform: translateY(-2px); box-shadow: 0 12px 28px rgba(0,229,255,.07); }
        
        .row-item { display: flex; align-items: center; gap: 14px; padding: 13px 18px; background: var(--surface2); border-radius: 11px; border: 1px solid var(--border); transition: background .2s; }
        .row-item:hover { background: #181f2e; }
        
        button { font-family: inherit; cursor: pointer; }
        input, textarea { font-family: inherit; outline: none; }
        
        .page-container { max-width: 800px; margin: 0 auto; padding: 24px 16px 50px; }
        .main-menu { min-height: calc(100vh - 52px); display: flex; align-items: center; justify-content: center; padding: 32px 20px; }
        .grid-buttons { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
        
        @media (max-width: 600px) {
            .grid-buttons { grid-template-columns: 1fr; }
            .page-container { padding: 20px 16px 40px; }
        }
        
        .stat-grid { display: grid; gap: 12px; margin-bottom: 28px; }
        .chat-messages { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 14px; margin-bottom: 14px; max-height: 50vh; }
        .message-user { justify-content: flex-end; }
        .message-assistant { justify-content: flex-start; }
        .bubble-user { background: rgba(0,229,255,.07); border: 1px solid rgba(0,229,255,.2); border-radius: 16px 16px 4px 16px; }
        .bubble-assistant { background: var(--surface2); border: 1px solid var(--border); border-radius: 16px 16px 16px 4px; }
    </style>
</head>

function getBadgeClass(color) {
  if (color === "High" || color === "Fast" || color === "green") return "badge-green";
  if (color === "Medium" || color === "amber") return "badge-amber";
  if (color === "Low" || color === "Slow" || color === "red") return "badge-red";

}

function renderBadge(text, color) {
  return `<span class="badge ${getBadgeClass(color)}">${text}</span>`;

function sendChatMessage() {
  const input = document.getElementById('chatInput');
  const message = input.value.trim();

  input.value = '';

  const userMsgDiv = document.createElement('div');
  userMsgDiv.className = 'message-user';
  userMsgDiv.style.display = 'flex';
  userMsgDiv.style.justifyContent = 'flex-end';
  userMsgDiv.style.marginBottom = '14px';
  userMsgDiv.innerHTML = `<div style="max-width:75%; padding:12px 16px; background:rgba(0,229,255,.07); border:1px solid rgba(0,229,255,.2); border-radius:16px 16px 4px 16px; font-size:14px;">${message}</div>`;
  messagesDiv.appendChild(userMsgDiv);
  
  const loadingDiv = document.createElement('div');
  loadingDiv.id = 'chatLoading';
  loadingDiv.style.display = 'flex';
  loadingDiv.style.gap = '9px';
  loadingDiv.style.alignItems = 'center';
  loadingDiv.style.marginBottom = '14px';
  loadingDiv.innerHTML = `<div style="width:30px; height:30px; border-radius:9px; background:linear-gradient(135deg, rgba(0,229,255,.12), rgba(124,58,237,.12)); border:1px solid rgba(0,229,255,.2); display:flex; align-items:center; justify-content:center; font-size:15px;">🤖</div><div style="display:flex; gap:5px; padding:12px 16px; background:var(--surface2); border:1px solid var(--border); border-radius:16px 16px 16px 4px;"><div style="width:7px; height:7px; border-radius:50%; background:var(--accent); animation:pulse 1.2s ease 0s infinite"></div><div style="width:7px; height:7px; border-radius:50%; background:var(--accent); animation:pulse 1.2s ease 0.2s infinite"></div><div style="width:7px; height:7px; border-radius:50%; background:var(--accent); animation:pulse 1.2s ease 0.4s infinite"></div></div>`;
  messagesDiv.appendChild(loadingDiv);
  messagesDiv.scrollTop = messagesDiv.scrollHeight;
  
  chatLoading = true;
  
  setTimeout(() => {
    const mockReplies = [
      "🔥 TOP PRODUCTS: Adidas Samba, Nike Tech Fleece, Levi's 501 Vintage\n💰 PROFIT: High (60-120%)\n⚡ SELL SPEED: Fast (1-3 dage)",
      "Bedste sneakers at flippe: Jordan 1 Retro, Adidas Samba, New Balance 550. Køb limited editions!",
      "Med 500 kr: Køb 2-3 vintage Ralph Lauren poloer (40-80 kr/stk). Sælg for 150-300 kr hver = profit!",
      "🏆 HOTTEST BRANDS: Levi's (S-tier), Nike (S-tier), Adidas (S-tier), Arc'teryx (S-tier)"
    ];
    const reply = mockReplies[Math.floor(Math.random() * mockReplies.length)];
    
    const loadingElem = document.getElementById('chatLoading');
    if (loadingElem) loadingElem.remove();
    
    const assistantDiv = document.createElement('div');
    assistantDiv.style.display = 'flex';
    assistantDiv.style.gap = '9px';
    assistantDiv.style.marginBottom = '14px';
    assistantDiv.innerHTML = `<div style="width:30px; height:30px; border-radius:9px; background:linear-gradient(135deg, rgba(0,229,255,.12), rgba(124,58,237,.12)); border:1px solid rgba(0,229,255,.2); display:flex; align-items:center; justify-content:center; font-size:15px;">🤖</div><div style="max-width:75%; padding:12px 16px; background:var(--surface2); border:1px solid var(--border); border-radius:16px 16px 16px 4px; font-size:14px; white-space:pre-wrap;">${reply}</div>`;
    messagesDiv.appendChild(assistantDiv);
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
    chatLoading = false;
  }, 800);
}

function renderChatPage() {
  return `
    <div class="animate-up" style="margin-bottom: 20px;">
      <div style="display: flex; align-items: center; gap: 10px;"><span style="font-size: 24px;">🤖</span><h1 style="font-family: Syne; font-size: 24px; font-weight: 800;">AI Chat</h1></div>
      <div style="font-size: 13px; color: var(--muted); padding-left: 34px;">Stil spørgsmål til din personlige resale AI</div>
      <div style="height: 1px; margin-top: 16px; background: linear-gradient(90deg, rgba(0,229,255,.35), transparent);"></div>
    </div>
    <div style="display: flex; gap: 7px; flex-wrap: wrap; margin-bottom: 16px;">
      <button onclick="document.getElementById('chatInput').value='Hvad sælger bedst nu?'; sendChatMessage();" style="padding:6px 13px; background:var(--surface2); border:1px solid var(--border); border-radius:20px; color:var(--muted); font-size:12px;">Hvad sælger bedst nu?</button>
      <button onclick="document.getElementById('chatInput').value='Bedste sneakers at flippe?'; sendChatMessage();" style="padding:6px 13px; background:var(--surface2); border:1px solid var(--border); border-radius:20px; color:var(--muted); font-size:12px;">Bedste sneakers?</button>
      <button onclick="document.getElementById('chatInput').value='Hvilke brands er hot?'; sendChatMessage();" style="padding:6px 13px; background:var(--surface2); border:1px solid var(--border); border-radius:20px; color:var(--muted); font-size:12px;">Hvilke brands er hot?</button>
    </div>
    <div id="chatMessages" class="chat-messages" style="height: 45vh; overflow-y: auto; margin-bottom: 16px;">
      <div style="display: flex; gap: 9px; margin-bottom: 14px;">
        <div style="width:30px; height:30px; border-radius:9px; background:linear-gradient(135deg, rgba(0,229,255,.12), rgba(124,58,237,.12)); border:1px solid rgba(0,229,255,.2); display:flex; align-items:center; justify-content:center;">🤖</div>
        <div style="max-width:75%; padding:12px 16px; background:var(--surface2); border:1px solid var(--border); border-radius:16px 16px 16px 4px; font-size:14px; white-space:pre-wrap;">👋 Hej! Jeg er Vinted AI.\n\nSpørg mig om:\n• 🔥 Hvad sælger bedst?\n• 💰 Mest profitable produkter?\n• ⚡ Hvad sælger hurtigst?</div>
      </div>
    </div>
    <div style="display: flex; gap: 9px;">
      <input id="chatInput" type="text" placeholder="Stil et spørgsmål..." onkeypress="if(event.key==='Enter') sendChatMessage();" style="flex:1; padding:13px 16px; background:var(--surface2); border:1px solid var(--border); border-radius:12px; color:var(--text); font-size:14px;">
      <button onclick="sendChatMessage()" style="padding:13px 18px; background:linear-gradient(135deg,#00e5ff,#7c3aed); border:none; border-radius:12px; color:white; font-size:17px;">➤</button>
    </div>
  `;
}

function renderMainMenu() {
  return `
    <div class="main-menu">
      <div style="width:100%; max-width:700px;">
        <div style="text-align:center; margin-bottom:32px; animation:up 0.5s ease both;">
          <div style="font-size:34px; margin-bottom:8px;">👋</div>
          <h1 style="font-family:Syne; font-size:26px; font-weight:800; margin-bottom:6px;">Hvad vil du analysere?</h1>
          <p style="color:var(--muted); font-size:14px;">Tryk på en knap for at åbne siden</p>
        </div>
        <div class="grid-buttons">
          ${NAV.map(n => `
            <button class="btn-nav animate-up" onclick="navigateTo('${n.id}')">
              <div style="width:50px; height:50px; border-radius:14px; background:var(--surface2); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; font-size:26px;">${n.icon}</div>
              <div style="flex:1; text-align:left;"><div style="font-weight:700; font-size:16px; font-family:Syne; margin-bottom:4px;">${n.label}</div><div style="font-size:12px; color:var(--muted);">${n.desc}</div></div>
              <div style="color:var(--muted); font-size:20px;">→</div>
            </button>
          `).join('')}
        </div>
      </div>
    </div>
  `;
}

function renderHeader() {
  const title = currentPage ? (NAV.find(n => n.id === currentPage)?.label || '') : '';
  return `
    <header style="background:var(--surface); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; padding:0 16px; height:52px; position:sticky; top:0; z-index:50;">
      <div style="display:flex; align-items:center; gap:10px;">
        ${currentPage ? `<button onclick="goBack()" style="width:32px; height:32px; border-radius:8px; background:var(--surface2); border:1px solid var(--border); cursor:pointer; color:var(--muted); font-size:18px; display:flex; align-items:center; justify-content:center;">←</button>` : ''}
        <span style="font-family:Syne; font-weight:800; font-size:18px; background:linear-gradient(90deg,#00e5ff,#a78bfa); -webkit-background-clip:text; -webkit-text-fill-color:transparent;">Vinted AI</span>
        ${currentPage ? `<span style="font-size:12px; color:var(--muted);">/ ${title}</span>` : ''}
      </div>
      <div style="display:flex; align-items:center; gap:8px;">
        <div style="display:flex; align-items:center; gap:6px; padding:4px 10px; background:rgba(16,185,129,.08); border:1px solid rgba(16,185,129,.2); border-radius:20px;">
          <div style="width:6px; height:6px; border-radius:50%; background:var(--green); animation:pulse 2s ease infinite;"></div>
          <span style="font-size:10px; color:var(--green); font-weight:600;">AI Online</span>
        </div>
        <button onclick="logout()" style="padding:5px 10px; background:rgba(239,68,68,.07); border:1px solid rgba(239,68,68,.15); border-radius:7px; color:var(--red); font-size:11px; cursor:pointer;">Log ud</button>
      </div>
    </header>
  `;
}

function renderContent() {
  if (!apiKey) {
    return renderLandingPage();
  }
  
  let pageContent = '';
  if (!currentPage) {
    pageContent = renderMainMenu();
  } else {
    switch(currentPage) {
      case 'trending': pageContent = renderTrendingPage(); break;
      case 'profit': pageContent = renderProfitPage(); break;
      case 'sellspeed': pageContent = renderSellSpeedPage(); break;
      case 'chat': pageContent = renderChatPage(); break;
      case 'market': pageContent = renderMarketPage(); break;
      case 'bestbuy': pageContent = renderBestBuyPage(); break;
      case 'brands': pageContent = renderBrandsPage(); break;
      case 'dashboard': pageContent = renderDashboardPage(); break;
      default: pageContent = renderMainMenu();
    }
  }
  
  return `
    ${renderHeader()}
    <div style="max-width:800px; margin:0 auto; padding:24px 16px 50px;">
      ${pageContent}
    </div>
  `;
}

function renderLandingPage() {
  return `
    <div style="min-height:100vh; display:flex; align-items:center; justify-content:center; position:relative; overflow:hidden; background:radial-gradient(ellipse 80% 50% at 50% -10%, rgba(0,229,255,.05), transparent), var(--bg);">
      <div style="position:relative; z-index:1; width:100%; max-width:440px; padding:0 20px; animation:up 0.7s ease both;">
        <div style="text-align:center; margin-bottom:40px;">
          <div style="font-size:48px; margin-bottom:14px;">🤖</div>
          <h1 style="font-family:Syne; font-size:38px; font-weight:800; background:linear-gradient(90deg,#00e5ff,#a78bfa,#00e5ff); background-size:200%; -webkit-background-clip:text; -webkit-text-fill-color:transparent; animation:shimmer 3s linear infinite; margin-bottom:10px;">Vinted AI</h1>
          <div style="font-size:12px; color:var(--muted); letter-spacing:.12em; text-transform:uppercase;">Professional Resale Intelligence</div>
        </div>
        <div style="background:var(--surface); border:1px solid var(--border); border-radius:20px; padding:30px; box-shadow:0 0 60px rgba(0,0,0,.6);">
          <div style="text-align:center; margin-bottom:22px;">
            <div style="font-size:17px; font-weight:700; font-family:Syne; margin-bottom:5px;">Aktivér AI System</div>
            <div style="font-size:13px; color:var(--muted);">Tryk Start for at prøve demo-versionen</div>
          </div>
          <button onclick="startDemo()" style="width:100%; padding:14px; border-radius:10px; border:none; cursor:pointer; background:linear-gradient(135deg,#00e5ff,#7c3aed); color:#fff; font-size:15px; font-weight:700; font-family:Syne; display:flex; align-items:center; justify-content:center; gap:9px;">
            <span>⚡</span> Start AI System
          </button>
          <div style="margin-top:16px; padding:9px 13px; background:rgba(0,229,255,.04); border:1px solid rgba(0,229,255,.1); border-radius:8px; font-size:11px; color:var(--muted); text-align:center;">🎮 Demo mode: Prøv alle funktioner gratis</div>
        </div>
      </div>
    </div>
  `;
}

function startDemo() {
  apiKey = "demo";
  currentPage = null;
  renderApp();
}

function logout() {
  apiKey = null;
  currentPage = null;
  renderApp();
}

function navigateTo(pageId) {
  currentPage = pageId;
  renderApp();
}

function goBack() {
  currentPage = null;
  renderApp();
}

function renderApp() {
  const appDiv = document.getElementById('app');
  if (appDiv) {
    appDiv.innerHTML = renderContent();
  }
}

window.navigateTo = navigateTo;
window.goBack = goBack;
window.logout = logout;
window.startDemo = startDemo;
window.sendChatMessage = sendChatMessage;

renderApp();
</script>
</body>
</html>
