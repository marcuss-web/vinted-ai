<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Vinted AI · Resale Intelligence</title>
    <style>
        /* additional critical reset for mobile */
        * { -webkit-tap-highlight-color: transparent; }
        body { margin: 0; padding: 0; overflow-x: hidden; }
        button, input, textarea { font-family: inherit; }
    </style>
</head>
<body>
<div id="root"></div>

<script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.development.js"></script>
<script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.development.js"></script>
<script src="https://cdn.jsdelivr.net/npm/babel-standalone@6.26.0/babel.min.js"></script>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

const NAV = [
  { id: "trending", icon: "🔥", label: "Trending Products", desc: "Se hvad der sælger mest lige nu" },
  { id: "profit", icon: "💰", label: "Profit Analysis", desc: "Find de mest profitable produkter" },
  { id: "sellspeed", icon: "⚡", label: "Sell Speed", desc: "Hvor hurtigt sælger produkterne?" },
  { id: "chat", icon: "🤖", label: "AI Chat", desc: "Spørg AI om resale og trends" },
  { id: "market", icon: "📈", label: "Market Trends", desc: "Aktuelle markedsbevægelser" },
  { id: "bestbuy", icon: "🛒", label: "Best Products To Buy", desc: "Bedste produkter at købe og flippe" },
  { id: "brands", icon: "🏆", label: "Best Brands", desc: "Top brands til resale" },
  { id: "dashboard", icon: "📊", label: "Dashboard", desc: "Komplet overblik over markedet" },

const SYSTEM_PROMPT = `You are Vinted AI — an elite resale market analyst. You specialize in trending products on Vinted, Depop, eBay, StockX. Focus on European markets (Denmark, Sweden, Germany, UK).
Always respond in clean structured format with emojis. Be concise and professional.
Use sections: 🔥 TOP PRODUCTS / 💰 PROFIT: High/Medium/Low / ⚡ SELL SPEED: Fast/Medium/Slow / 📌 TIPS
Answer in the same language the user writes in.`;

const css = `
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #07090f; --surface: #0e1119; --surface2: #141820;
    --border: #1c2333; --accent: #00e5ff; --purple: #7c3aed;
    --text: #e2e8f4; --muted: #4b5a72; --green: #10b981; --red: #ef4444; --amber: #f59e0b;
  }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; }
  ::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  @keyframes up { from { opacity:0; transform:translateY(20px) } to { opacity:1; transform:translateY(0) } }
  @keyframes spin { to { transform: rotate(360deg) } }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  @keyframes shimmer { 0%{background-position:-200% center} 100%{background-position:200% center} }
  @keyframes scan { 0%{top:-2px;opacity:.5} 100%{top:100%;opacity:0} }
`;

function Badge({ children, color }) {
  const c = { green: ["rgba(16,185,129,.12)","rgba(16,185,129,.35)","#10b981"], amber: ["rgba(245,158,11,.12)","rgba(245,158,11,.35)","#f59e0b"], red: ["rgba(239,68,68,.12)","rgba(239,68,68,.35)","#ef4444"], cyan: ["rgba(0,229,255,.12)","rgba(0,229,255,.35)","#00e5ff"], purple: ["rgba(124,58,237,.12)","rgba(124,58,237,.35)","#a78bfa"] }[color] || ["rgba(0,229,255,.12)","rgba(0,229,255,.35)","#00e5ff"];
  return <span style={{ padding: "3px 9px", borderRadius: 20, fontSize: 11, fontWeight: 600, background: c[0], border: `1px solid ${c[1]}`, color: c[2], letterSpacing: ".04em", textTransform: "uppercase" }}>{children}</span>;
}

function Card({ children, style = {}, delay = 0 }) {
  return (
    <div style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 14, padding: 20, animation: `up .45s ease ${delay}s both`, transition: "transform .2s, box-shadow .2s", ...style }}
      onMouseEnter={e => { e.currentTarget.style.transform = "translateY(-2px)"; e.currentTarget.style.boxShadow = "0 8px 32px rgba(0,229,255,.07)"; }}
      onMouseLeave={e => { e.currentTarget.style.transform = ""; e.currentTarget.style.boxShadow = ""; }}>
      {children}
    </div>
  );
}

function Row({ rank, name, brand, profit, speed, category, delay = 0 }) {
  const sc = { Fast: "green", Medium: "amber", Slow: "red" }[speed];
  const pc = { High: "green", Medium: "amber", Low: "red" }[profit];
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 14, padding: "13px 18px", background: "var(--surface2)", borderRadius: 11, border: "1px solid var(--border)", animation: `up .4s ease ${delay}s both`, transition: "background .2s" }}
      onMouseEnter={e => e.currentTarget.style.background = "#181f2e"}
      onMouseLeave={e => e.currentTarget.style.background = "var(--surface2)"}>
      <div style={{ width: 26, height: 26, borderRadius: 7, background: "rgba(0,229,255,.07)", border: "1px solid var(--border)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 11, fontWeight: 700, color: "var(--accent)", flexShrink: 0 }}>{rank}</div>
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{ fontWeight: 600, fontSize: 14 }}>{name}</div>
        <div style={{ fontSize: 12, color: "var(--muted)", marginTop: 2 }}>{brand} · {category}</div>
      </div>
      <div style={{ display: "flex", gap: 7, flexShrink: 0 }}><Badge color={pc}>{profit}</Badge><Badge color={sc}>{speed}</Badge></div>
    </div>
  );
}

function PageTitle({ icon, title, sub }) {
  return (
    <div style={{ marginBottom: 28, animation: "up .4s ease both" }}>
      <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 4 }}>
        <span style={{ fontSize: 24 }}>{icon}</span>
        <h1 style={{ fontFamily: "Syne", fontSize: 24, fontWeight: 800 }}>{title}</h1>
      </div>
      <div style={{ fontSize: 13, color: "var(--muted)", paddingLeft: 34 }}>{sub}</div>
      <div style={{ height: 1, marginTop: 16, background: "linear-gradient(90deg, rgba(0,229,255,.35), transparent)" }} />
    </div>
  );
}

function StatRow({ stats }) {
  const colorMap = { cyan: "var(--accent)", green: "var(--green)", amber: "var(--amber)", red: "var(--red)", purple: "#a78bfa" };
  return (
    <div style={{ display: "grid", gridTemplateColumns: `repeat(${stats.length}, 1fr)`, gap: 12, marginBottom: 28 }}>
      {stats.map((s, i) => (
        <Card key={i} delay={i * .05} style={{ textAlign: "center", padding: 16 }}>
          <div style={{ fontSize: 22, marginBottom: 6 }}>{s.icon}</div>
          <div style={{ fontSize: 20, fontWeight: 800, fontFamily: "Syne", color: colorMap[s.color] || "var(--text)" }}>{s.value}</div>
          <div style={{ fontSize: 11, color: "var(--muted)", marginTop: 3 }}>{s.label}</div>
        </Card>
      ))}
    </div>
  );
}

function ChatPage({ apiKey }) {
  const [messages, setMessages] = useState([{ role: "assistant", content: "👋 Hej! Jeg er Vinted AI.\n\nSpørg mig om:\n• 🔥 Hvad sælger bedst?\n• 💰 Mest profitable produkter?\n• ⚡ Hvad sælger hurtigst?\n• 🏆 Hvilke brands er trending?" }]);
  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);
  const bottomRef = useRef(null);
  const suggestions = ["Hvad sælger bedst nu?", "Bedste sneakers at flippe?", "Hvad skal jeg købe for 500 kr?", "Hvilke brands er hot?"];

  useEffect(() => { bottomRef.current?.scrollIntoView({ behavior: "smooth" }); }, [messages]);

  const send = async (text) => {
    const q = (text || input).trim();
    if (!q || loading) return;
    setInput("");
    const history = [...messages, { role: "user", content: q }].map(m => ({ role: m.role, content: m.content }));
    setMessages(history);
    setLoading(true);
    try {
      const isGroq = apiKey.startsWith("gsk-");
      let reply = "";
      if (isGroq) {
        const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
          method: "POST",
          headers: { "Content-Type": "application/json", "Authorization": `Bearer ${apiKey}` },
          body: JSON.stringify({ model: "llama-3.3-70b-versatile", max_tokens: 1000, messages: [{ role: "system", content: SYSTEM_PROMPT }, ...history] }),
        });
        const data = await res.json();
        reply = data.choices?.[0]?.message?.content || "Beklager, prøv igen.";
      } else {
        const res = await fetch("https://api.anthropic.com/v1/messages", {
          method: "POST",
          headers: { "Content-Type": "application/json", "x-api-key": apiKey, "anthropic-version": "2023-06-01", "anthropic-dangerous-direct-browser-access": "true" },
          body: JSON.stringify({ model: "claude-sonnet-4-20250514", max_tokens: 1000, system: SYSTEM_PROMPT, messages: history }),
        });
        const data = await res.json();
        reply = data.content?.[0]?.text || "Beklager, prøv igen.";
      }
      setMessages(m => [...m, { role: "assistant", content: reply }]);
    } catch {
      setMessages(m => [...m, { role: "assistant", content: "❌ Fejl. Tjek din API nøgle og prøv igen." }]);
    }
    setLoading(false);
  };

  return (
    <div style={{ display: "flex", flexDirection: "column", height: "calc(100vh - 130px)", minHeight: 400 }}>
      <PageTitle icon="🤖" title="AI Chat" sub="Stil spørgsmål til din personlige resale AI" />
      <div style={{ display: "flex", gap: 7, flexWrap: "wrap", marginBottom: 16 }}>
        {suggestions.map((s, i) => (
          <button key={i} onClick={() => send(s)} style={{ padding: "6px 13px", background: "var(--surface2)", border: "1px solid var(--border)", borderRadius: 20, color: "var(--muted)", fontSize: 12, cursor: "pointer", transition: "all .2s", fontFamily: "inherit" }}
            onMouseEnter={e => { e.currentTarget.style.borderColor = "rgba(0,229,255,.4)"; e.currentTarget.style.color = "var(--accent)"; }}
            onMouseLeave={e => { e.currentTarget.style.borderColor = "var(--border)"; e.currentTarget.style.color = "var(--muted)"; }}>
            {s}
          </button>
        ))}
      </div>
      <div style={{ flex: 1, overflowY: "auto", display: "flex", flexDirection: "column", gap: 14, marginBottom: 14, paddingRight: 4 }}>
        {messages.map((m, i) => (
          <div key={i} style={{ display: "flex", justifyContent: m.role === "user" ? "flex-end" : "flex-start", animation: "up .3s ease both" }}>
            {m.role === "assistant" && <div style={{ width: 30, height: 30, borderRadius: 9, background: "linear-gradient(135deg, rgba(0,229,255,.12), rgba(124,58,237,.12))", border: "1px solid rgba(0,229,255,.2)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 15, flexShrink: 0, marginRight: 9, marginTop: 3 }}>🤖</div>}
            <div style={{ maxWidth: "75%", padding: "12px 16px", borderRadius: m.role === "user" ? "16px 16px 4px 16px" : "16px 16px 16px 4px", background: m.role === "user" ? "rgba(0,229,255,.07)" : "var(--surface2)", border: `1px solid ${m.role === "user" ? "rgba(0,229,255,.2)" : "var(--border)"}`, fontSize: 14, lineHeight: 1.7, whiteSpace: "pre-wrap" }}>{m.content}</div>
          </div>
        ))}
        {loading && (
          <div style={{ display: "flex", gap: 9, alignItems: "center" }}>
            <div style={{ width: 30, height: 30, borderRadius: 9, background: "linear-gradient(135deg, rgba(0,229,255,.12), rgba(124,58,237,.12))", border: "1px solid rgba(0,229,255,.2)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 15 }}>🤖</div>
            <div style={{ display: "flex", gap: 5, padding: "12px 16px", background: "var(--surface2)", border: "1px solid var(--border)", borderRadius: "16px 16px 16px 4px" }}>
              {[0, .2, .4].map((d, i) => <div key={i} style={{ width: 7, height: 7, borderRadius: "50%", background: "var(--accent)", animation: `pulse 1.2s ease ${d}s infinite` }} />)}
            </div>
          </div>
        )}
        <div ref={bottomRef} />
      </div>
      <div style={{ display: "flex", gap: 9 }}>
        <input value={input} onChange={e => setInput(e.target.value)} onKeyDown={e => e.key === "Enter" && send()} placeholder="Stil et spørgsmål..."
          style={{ flex: 1, padding: "13px 16px", background: "var(--surface2)", border: "1px solid var(--border)", borderRadius: 12, color: "var(--text)", fontSize: 14, outline: "none", fontFamily: "inherit", transition: "border .2s" }}
          onFocus={e => e.target.style.borderColor = "rgba(0,229,255,.4)"}
          onBlur={e => e.target.style.borderColor = "var(--border)"} />
        <button onClick={() => send()} disabled={loading || !input.trim()} style={{ padding: "13px 18px", background: input.trim() && !loading ? "linear-gradient(135deg,#00e5ff,#7c3aed)" : "var(--surface2)", border: "1px solid var(--border)", borderRadius: 12, color: input.trim() && !loading ? "#fff" : "var(--muted)", cursor: loading || !input.trim() ? "not-allowed" : "pointer", fontSize: 17, transition: "all .2s" }}>➤</button>
      </div>
    </div>
  );
}

function LandingPage({ onStart }) {
  const [key, setKey] = useState("");
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState("");
  const [d, setD] = useState("");

  useEffect(() => {
    if (!loading) return;
    const t = setInterval(() => setD(v => v.length >= 3 ? "" : v + "."), 500);
    return () => clearInterval(t);
  }, [loading]);

  const go = async () => {
    if (!key.trim()) { setError("Indtast din API nøgle."); return; }
    if (key.trim().length < 10) { setError("Nøglen ser for kort ud."); return; }
    setLoading(true); setError("");
    await new Promise(r => setTimeout(r, 1600));
    setLoading(false);
    onStart(key.trim());
  };

  return (
    <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", position: "relative", overflow: "hidden", background: "radial-gradient(ellipse 80% 50% at 50% -10%, rgba(0,229,255,.05), transparent), var(--bg)" }}>
      <div style={{ position: "absolute", inset: 0, backgroundImage: "linear-gradient(rgba(28,35,51,.5) 1px, transparent 1px), linear-gradient(90deg, rgba(28,35,51,.5) 1px, transparent 1px)", backgroundSize: "56px 56px", pointerEvents: "none" }} />
      <div style={{ position: "absolute", left: 0, right: 0, height: 1, background: "linear-gradient(90deg, transparent, rgba(0,229,255,.4), transparent)", animation: "scan 5s linear infinite", pointerEvents: "none" }} />
      <div style={{ position: "relative", zIndex: 1, width: "100%", maxWidth: 440, padding: "0 20px", animation: "up .7s ease both" }}>
        <div style={{ textAlign: "center", marginBottom: 40 }}>
          <div style={{ fontSize: 48, marginBottom: 14 }}>🤖</div>
          <h1 style={{ fontFamily: "Syne", fontSize: 38, fontWeight: 800, background: "linear-gradient(90deg,#00e5ff,#a78bfa,#00e5ff)", backgroundSize: "200%", WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent", animation: "shimmer 3s linear infinite", marginBottom: 10 }}>Vinted AI</h1>
          <div style={{ fontSize: 12, color: "var(--muted)", letterSpacing: ".12em", textTransform: "uppercase" }}>Professional Resale Intelligence</div>
        </div>
        <div style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 20, padding: 30, boxShadow: "0 0 60px rgba(0,0,0,.6)" }}>
          <div style={{ textAlign: "center", marginBottom: 22 }}>
            <div style={{ fontSize: 17, fontWeight: 700, fontFamily: "Syne", marginBottom: 5 }}>Aktivér AI System</div>
            <div style={{ fontSize: 13, color: "var(--muted)" }}>Indtast din Groq eller Anthropic API nøgle</div>
          </div>
          <label style={{ display: "block", fontSize: 11, fontWeight: 600, color: "var(--muted)", letterSpacing: ".08em", textTransform: "uppercase", marginBottom: 7 }}>API Nøgle</label>
          <input type="password" value={key} onChange={e => { setKey(e.target.value); setError(""); }} onKeyDown={e => e.key === "Enter" && go()} placeholder="gsk-... eller sk-ant-..."
            style={{ width: "100%", padding: "12px 14px", background: "var(--surface2)", border: `1px solid ${error ? "var(--red)" : "var(--border)"}`, borderRadius: 10, color: "var(--text)", fontSize: 14, outline: "none", fontFamily: "inherit", transition: "border .2s", marginBottom: 6 }}
            onFocus={e => { if (!error) e.target.style.borderColor = "rgba(0,229,255,.45)"; }}
            onBlur={e => { if (!error) e.target.style.borderColor = error ? "var(--red)" : "var(--border)"; }} />
          {error && <div style={{ fontSize: 12, color: "var(--red)", marginBottom: 10 }}>{error}</div>}
          <button onClick={go} disabled={loading} style={{ width: "100%", padding: "14px", borderRadius: 10, border: "none", cursor: loading ? "not-allowed" : "pointer", background: loading ? "var(--surface2)" : "linear-gradient(135deg,#00e5ff,#7c3aed)", color: loading ? "var(--muted)" : "#fff", fontSize: 15, fontWeight: 700, fontFamily: "Syne", transition: "all .3s", opacity: loading ? .7 : 1, boxShadow: loading ? "none" : "0 4px 24px rgba(0,229,255,.2)", display: "flex", alignItems: "center", justifyContent: "center", gap: 9, marginTop: 4 }}
            onMouseEnter={e => { if (!loading) e.currentTarget.style.transform = "translateY(-1px)"; }}
            onMouseLeave={e => { e.currentTarget.style.transform = ""; }}>
            {loading
              ? <><div style={{ width: 16, height: 16, border: "2px solid rgba(255,255,255,.3)", borderTopColor: "#fff", borderRadius: "50%", animation: "spin .8s linear infinite" }} /> Starter{d}</>
              : <><span>⚡</span> Start AI System</>}
          </button>
          <div style={{ marginTop: 16, padding: "9px 13px", background: "rgba(0,229,255,.04)", border: "1px solid rgba(0,229,255,.1)", borderRadius: 8, fontSize: 11, color: "var(--muted)", textAlign: "center" }}>
            🔒 Din nøgle gemmes kun lokalt i denne session
          </div>
        </div>
      </div>
    </div>
  );
}
